<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lost Leads Management</title>
  <link rel="icon" type="image/png" href="Logos/DV-Logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dashboard-body">
  <div class="layout-root">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <img src="Logos/DV-Logo.png" alt="DV Analytics" class="sidebar-logo" />
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link">Dashboard</a>
        <a href="pre-workshop.html" class="sidebar-link">Pre-Workshop</a>
        <a href="post-workshop.html" class="sidebar-link">Post-Workshop</a>
        <a href="lost-leads.html" class="sidebar-link">Lost Leads</a>
        <a href="monitoring.html" class="sidebar-link">Monitoring</a>
      </nav>
      <a href="counselor-management.html" class="sidebar-link sidebar-link-bottom admin-only" data-admin-only="true">Counselor Management</a>
    </aside>

    <div class="main-content">
      <header class="topbar">
        <div class="topbar-title">
          <h1>Lost Leads</h1>
          <p>Track leads marked as not interested across pre and post workshop stages.</p>
        </div>
        <div class="topbar-profile">
          <span class="role-tag" data-role-tag></span>
          <button data-logout class="btn-ghost" type="button">Log out</button>
        </div>
      </header>

      <section class="kpi-grid" id="lostKpiSection"></section>
      <section class="card filter-bar">
        <div class="filter-row">
          <div class="filter-item">
            <label for="lostSearchInput">Search Lead</label>
            <input id="lostSearchInput" type="text" placeholder="Name, email, phone, workshop, counselor" />
          </div>
          <div class="filter-item filter-item-cta">
            <label>&nbsp;</label>
            <div class="filter-actions">
              <button id="applyLostSearch" class="btn-ghost" type="button">Apply</button>
              <button id="resetLostSearch" class="btn-ghost" type="button">Reset</button>
            </div>
          </div>
        </div>
      </section>
      <section class="card table-card" id="lostLeadTableSection"></section>
    </div>
  </div>

  <script type="module" src="lost-leads.js"></script>
  <script type="module" src="layouts.js"></script>
</body>
</html>
